  <meta name="description" content="墨读 Inkura，基于开源阅读生态重构的现代化阅读工具。" />
  <link rel="stylesheet" href="../styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="shell topbar-inner">
      <a class="brand" href="./index.html"><span class="dot"></span>Inkura</a>
      <nav class="nav">
        <a href="./privacy.html">隐私政策</a>
        <a href="./support.html">支持</a>
        <a class="lang" href="../index.html">EN</a>
      </nav>
    </div>
  </header>

  <main class="shell">
    <section class="hero">
      <p class="eyebrow">开放阅读工具</p>
      <h1><span class="gradient-text">墨读 Inkura</span></h1>
      <p class="subtitle">面向 iOS 的新一代阅读工具，在开源阅读生态能力基础上做了架构重构与体验升级，提供更轻盈、更饱满的产品体验。</p>
      <div class="actions">
        <a class="btn primary" href="./support.html">获取支持</a>
        <a class="btn" href="./privacy.html">查看隐私政策</a>
      </div>
    </section>

    <section>
      <h2 class="section-title">核心能力</h2>
      <div class="grid">
        <article class="card">
          <h3>书源规则引擎</h3>
          <p>支持搜索、目录、正文抓取与规则化解析，并提供内容净化处理链路。</p>
        </article>
        <article class="card">
          <h3>本地导入能力</h3>
          <p>增强版 EPUB / TXT 解析，支持大文件与多编码场景，导入更稳定。</p>
        </article>
        <article class="card">
          <h3>阅读与服务</h3>
          <p>书架进度管理、主题与朗读、iCloud 同步，以及 App Store 合规的购买/恢复购买流程。</p>
        </article>
      </div>
    </section>

    <footer>
      <span>© 2026 Inkura</span>
      <a href="mailto:support@inkura.app">support@inkura.app</a>
    </footer>
  </main>
